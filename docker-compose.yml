services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: hubcontabil-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      STORAGE_ROOT: /app/storage
    ports:
      - "3333:3333"
    volumes:
      - app_storage:/app/storage

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: hubcontabil-worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      STORAGE_ROOT: /app/storage
      WPPCONNECT_BASE_URL: ${WPPCONNECT_BASE_URL:-http://wppconnect:21465}
    volumes:
      - app_storage:/app/storage

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hubcontabil-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333/api}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  app_storage:
